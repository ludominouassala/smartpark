<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-parking"></i> SmartPark
            </a>
            <div class="d-flex">
                <span class="navbar-text text-white me-3" id="currentDateTime"></span>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <div class="list-group">
                    <a href="index.html" class="list-group-item list-group-item-action active">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                    <a href="vagas.html" class="list-group-item list-group-item-action">
                        <i class="fas fa-parking"></i> Vagas
                    </a>
                    <a href="tickets.html" class="list-group-item list-group-item-action">
                        <i class="fas fa-ticket-alt"></i> Tickets Ativos
                    </a>
                    <a href="pagamentos.html" class="list-group-item list-group-item-action">
                        <i class="fas fa-credit-card"></i> Pagamentos
                    </a>
                    <a href="historico.html" class="list-group-item list-group-item-action">
                        <i class="fas fa-history"></i> Histórico
                    </a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-10">
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h5 class="card-title">Total de Vagas</h5>
                                <h2 id="totalVagas">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-success">
                            <div class="card-body">
                                <h5 class="card-title">Vagas Livres</h5>
                                <h2 id="vagasLivres">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-warning">
                            <div class="card-body">
                                <h5 class="card-title">Vagas Ocupadas</h5>
                                <h2 id="vagasOcupadas">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-info">
                            <div class="card-body">
                                <h5 class="card-title">Tickets Ativos</h5>
                                <h2 id="ticketsAtivos">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>Últimas Entradas</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-sm" id="ultimasEntradasTable">
                                        <thead>
                                            <tr><th>Placa</th><th>Vaga</th><th>Entrada</th></tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>Registrar Nova Entrada</h5>
                            </div>
                            <div class="card-body">
                                <form id="entradaForm">
                                    <div class="mb-2">
                                        <input type="text" class="form-control" id="placa" placeholder="Placa" required maxlength="10">
                                    </div>
                                    <div class="mb-2">
                                        <input type="text" class="form-control" id="modelo" placeholder="Modelo">
                                    </div>
                                    <div class="mb-2">
                                        <input type="text" class="form-control" id="cor" placeholder="Cor">
                                    </div>
                                    <div class="mb-2">
                                        <select class="form-control" id="tipoVeiculo">
                                            <option value="CARRO">Carro</option>
                                            <option value="MOTO">Moto</option>
                                            <option value="CAMINHAO">Caminhão</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Registrar Entrada</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-header">
                                <h5>Mapa de Vagas</h5>
                            </div>
                            <div class="card-body">
                                <div id="mapaVagas" class="vagas-grid"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

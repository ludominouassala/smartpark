<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Tickets Ativos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="fas fa-parking"></i> SmartPark</a>
        </div>
    </nav>
    
    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-2 sidebar">
                <div class="list-group">
                    <a href="index.html" class="list-group-item list-group-item-action">Dashboard</a>
                    <a href="vagas.html" class="list-group-item list-group-item-action">Vagas</a>
                    <a href="tickets.html" class="list-group-item list-group-item-action active">Tickets Ativos</a>
                    <a href="pagamentos.html" class="list-group-item list-group-item-action">Pagamentos</a>
                    <a href="historico.html" class="list-group-item list-group-item-action">Histórico</a>
                </div>
            </div>
            
            <div class="col-md-10">
                <h2><i class="fas fa-ticket-alt"></i> Tickets Ativos</h2>
                
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Registrar Saída</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="number" class="form-control" id="ticketIdSaida" placeholder="ID do Ticket">
                            <button class="btn btn-warning" onclick="registrarSaida()">
                                <i class="fas fa-sign-out-alt"></i> Gerar QR Code para Pagamento
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-body">
                        <div id="ticketsAtivosList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal QR Code -->
    <div class="modal fade" id="qrcodeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">QR Code para Pagamento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="qrcodeContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" onclick="confirmarPagamento()">
                        Simular Pagamento
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/tickets.js"></script>
</body>
</html>

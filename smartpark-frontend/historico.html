<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Histórico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="fas fa-parking"></i> SmartPark</a>
        </div>
    </nav>
    
    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-2 sidebar">
                <div class="list-group">
                    <a href="index.html" class="list-group-item list-group-item-action">Dashboard</a>
                    <a href="vagas.html" class="list-group-item list-group-item-action">Vagas</a>
                    <a href="tickets.html" class="list-group-item list-group-item-action">Tickets Ativos</a>
                    <a href="pagamentos.html" class="list-group-item list-group-item-action">Pagamentos</a>
                    <a href="historico.html" class="list-group-item list-group-item-action active">Histórico</a>
                </div>
            </div>
            
            <div class="col-md-10">
                <h2><i class="fas fa-history"></i> Histórico Completo</h2>
                
                <div class="card mb-3">
                    <div class="card-header">
                        <h5>Veículos Cadastrados</h5>
                    </div>
                    <div class="card-body">
                        <div id="veiculosList"></div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h5>Buscar Veículo</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" id="buscarPlaca" placeholder="Digite a placa">
                            <button class="btn btn-primary" onclick="buscarVeiculo()">Buscar</button>
                        </div>
                        <div id="veiculoDetalhe"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/historico.js"></script>
</body>
</html>
